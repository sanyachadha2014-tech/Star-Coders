<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Complaint - CivicFix</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: white;
}

.logo {
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

textarea {
  height: 100px;
}

.upload-box {
  border: 2px dashed #ccc;
  padding: 30px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

.upload-box:hover {
  background: #f9fafb;
}

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.ai-box {
  margin-top: 20px;
  padding: 15px;
  background: #f1f5ff;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">CivicFix</div>
  <button onclick="window.location.href='dashboard.html'">Dashboard</button>
</div>

<div class="container">
  <h2>Submit Civic Complaint</h2>

  <!-- IMAGE -->
  <div class="upload-box" onclick="document.getElementById('image').click()">
    Click to upload photo
  </div>
  <input type="file" id="image" hidden>
  <img id="preview" class="preview" style="display:none;">

  <!-- FORM -->
  <input type="text" id="title" placeholder="Complaint Title">
  <textarea id="description" placeholder="Describe the issue"></textarea>
  <input type="text" id="location" placeholder="Location">
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="contact" placeholder="Contact Number">

  <!-- AI RESULT -->
  <div class="ai-box" id="aiBox"></div>

  <button onclick="submitComplaint()">Submit Complaint</button>
</div>

<script>

const url = "https://bsfnlqrserdkrcdjqrlc.supabase.co/rest/v1/complaints";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZm5scXJzZXJka3JjZGpxcmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDg5MTMsImV4cCI6MjA4OTcyNDkxM30.HvvmFOq3MVvnUmMcSW6-cG6Uyb0m4oPK_Pzvc8ykues";

/* IMAGE PREVIEW */
let imageData = "";

document.getElementById("image").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      imageData = reader.result;

      const preview = document.getElementById("preview");
      preview.src = imageData;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

async function submitComplaint(){
  try{

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const location = document.getElementById("location").value;
    const name = document.getElementById("name").value;
    const phone = document.getElementById("contact").value;

    if(!title || !description || !location){
      alert("Fill required fields ❗");
      return;
    }

    /* SIMPLE AI LOGIC (same as backend) */
    let category = "General Issue";
    let priority = "medium";
    let est_time = "2-3 days";
    let confidence = 0.9;
    let ai_label = "Auto Classified";

    const text = (title + " " + description).toLowerCase();

    if(text.includes("road")){
      category = "Road Issue";
      priority = "high";
      est_time = "1-2 days";
    }
    else if(text.includes("water")){
      category = "Water Issue";
    }
    else if(text.includes("electric")){
      category = "Electric Issue";
    }
    else if(text.includes("garbage")){
      category = "Garbage Issue";
    }

    /* INSERT INTO SUPABASE */
    const res = await fetch(url,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":key,
        "Authorization":"Bearer "+key,
        "Prefer":"return=representation"
      },
      body: JSON.stringify({
        category,
        description,
        location,
        status: "pending",
        priority,
        assigned_to: "Auto",
        est_time,
        image_url: imageData || null
      })
    });

    if(!res.ok){
      const err = await res.text();
      console.log(err);
      alert("Insert failed ❌");
      return;
    }

    const result = await res.json();
    console.log("Inserted:", result);

    /* SHOW AI BOX */
    document.getElementById("aiBox").style.display = "block";
    document.getElementById("aiBox").innerHTML =
      `Category: ${category}<br>
       Priority: ${priority}<br>
       Time: ${est_time}<br>
       AI: ${ai_label} (${(confidence*100).toFixed(1)}%)`;

    alert("Complaint Submitted ✅");

  }catch(err){
    console.log(err);
    alert("Error ❌");
  }
}

</script>
</body>
</html>
