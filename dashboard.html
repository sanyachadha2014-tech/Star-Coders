<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CivicFix Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f5f7fb;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:white;
  position:sticky;
  top:0;
}
.logo{font-weight:bold;font-size:20px}
.nav-links a{
  margin-left:15px;
  text-decoration:none;
  color:#555;
}

/* HEADER */
.header{padding:20px 40px}

/* STATS */
.stats{
  display:flex;
  gap:15px;
  padding:0 40px;
  flex-wrap:wrap;
}
.stat{
  flex:1;
  min-width:150px;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* COLORS */
.pending{color:orange}
.progress{color:#3b82f6}
.resolved{color:green}

/* LIST */
.container{padding:20px 40px}

/* CARD */
.card{
  display:flex;
  background:white;
  margin-bottom:20px;
  border-radius:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
  overflow:hidden;
}

.bar{width:8px;}
.bar.pending{background:orange}
.bar.progress{background:#3b82f6}
.bar.resolved{background:green}

/* CONTENT */
.content{flex:1;padding:18px}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BADGES */
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}
.badge.pending{background:orange}
.badge.progress{background:#3b82f6}
.badge.resolved{background:green}

.badge.high{background:#f97316}
.badge.medium{background:#eab308;color:black}
.badge.low{background:#10b981}

/* INFO */
.info{
  display:flex;
  gap:20px;
  margin-top:10px;
  font-size:13px;
  color:#444;
}

/* AI BOX */
.ai-box{
  background:#eef2f7;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  margin-top:12px;
  font-size:13px;
}

/* TAGS */
.tags{
  margin-top:12px;
}
.tags span{
  background:#eef2ff;
  padding:6px 12px;
  border-radius:10px;
  margin-right:8px;
  font-size:12px;
  display:inline-block;
}

/* TIMELINE */
.timeline{
  margin-top:12px;
  font-size:13px;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.done{color:green}
.active{color:#3b82f6;font-weight:bold}
.todo{color:#aaa}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">CivicFix</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</div>

<div class="header">
  <h2>Dashboard</h2>
</div>

<div class="stats" id="stats"></div>
<div class="container" id="list"></div>

<script>

const url = "https://bsfnlqrserdkrcdjqrlc.supabase.co/rest/v1/complaints";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZm5scXJzZXJka3JjZGpxcmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDg5MTMsImV4cCI6MjA4OTcyNDkxM30.HvvmFOq3MVvnUmMcSW6-cG6Uyb0m4oPK_Pzvc8ykues";

let currentFilter = "all";

function setFilter(t){
  currentFilter = t;
  load();
}

function norm(s){
  return (s||"").toLowerCase().trim();
}

/* DEPARTMENT */
function getDeptDetails(cat){
  cat = (cat||"").toLowerCase();

  if(cat.includes("road"))
    return {dept:"Road Department",worker:"Ramesh Kumar",phone:"+91 9876543210",material:"Tar, Cement"};

  if(cat.includes("electric"))
    return {dept:"Electrical Department",worker:"Suresh Yadav",phone:"+91 9123456780",material:"Wires"};

  if(cat.includes("water"))
    return {dept:"Water Supply Dept",worker:"Imran Khan",phone:"+91 9988776655",material:"Pipes"};

  if(cat.includes("garbage"))
    return {dept:"Sanitation Dept",worker:"Mohan Lal",phone:"+91 9090909090",material:"Bins"};

  return {dept:"General Department",worker:"Staff",phone:"+91 9000000000",material:"Tools"};
}

/* AI */
function getAI(c){
  let base = 85;
  let str = (c.id || c.category || "").toString();
  let hash = 0;

  for(let i=0;i<str.length;i++){
    hash = (hash + str.charCodeAt(i)) % 7;
  }

  let confidence = base + hash;

  let time = "2-3 days";
  if(c.priority === "high") time = "1-2 days";
  if(c.priority === "low") time = "3-5 days";

  return {confidence, time};
}

/* TIMELINE */
function timeline(status){
  const steps = ["pending","verified","assigned","in progress","resolved"];
  let idx = steps.indexOf(status);

  return steps.map((s,i)=>{
    if(i < idx) return `<span class="done">✔ ${s}</span>`;
    if(i === idx) return `<span class="active">● ${s}</span>`;
    return `<span class="todo">○ ${s}</span>`;
  }).join("");
}

async function load(){
  try{
    const res = await fetch(url,{
      headers:{
        apikey:key,
        Authorization:"Bearer "+key
      }
    });

    let data = await res.json();

    data.forEach(c=>{
      c.status = norm(c.status);
      c.priority = norm(c.priority);
    });

    const pending = data.filter(x=>x.status==="pending").length;
    const progress = data.filter(x=>x.status==="in progress").length;
    const resolved = data.filter(x=>x.status==="resolved").length;

    let filtered = data;

    if(currentFilter==="pending") filtered = data.filter(x=>x.status==="pending");
    else if(currentFilter==="in progress") filtered = data.filter(x=>x.status==="in progress");
    else if(currentFilter==="resolved") filtered = data.filter(x=>x.status==="resolved");

    document.getElementById("stats").innerHTML = `
      <div class="stat" onclick="setFilter('all')">Total<br><b>${data.length}</b></div>
      <div class="stat pending" onclick="setFilter('pending')">Pending<br><b>${pending}</b></div>
      <div class="stat progress" onclick="setFilter('in progress')">In Progress<br><b>${progress}</b></div>
      <div class="stat resolved" onclick="setFilter('resolved')">Resolved<br><b>${resolved}</b></div>
    `;

    let html = "";

    filtered.forEach(c=>{
      let d = getDeptDetails(c.category);
      let {confidence, time} = getAI(c);

      html += `
      <div class="card">
        <div class="bar ${c.status}"></div>
        <div class="content">

          <div class="row">
            <h3>${c.category || "Complaint"}</h3>
            <span class="badge ${c.priority}">${c.priority}</span>
          </div>

          <p>${c.description || "No description"}</p>

          <span class="badge ${c.status}">${c.status}</span>

          <div class="info">
            <div>📍 ${c.location || "City Area"}</div>
          </div>

          <div class="ai-box">
            <div>🤖 ${confidence}%</div>
            <div>⏱ ${c.est_time || time}</div>
          </div>

          <div class="tags">
            <span>${d.dept}</span>
            <span>${d.worker}</span>
            <span>${d.phone}</span>
          </div>

          <div class="timeline">
            ${timeline(c.status)}
          </div>

        </div>
      </div>`;
    });

    document.getElementById("list").innerHTML = html;

  }catch(err){
    console.log(err);
  }
}

load();

/* 🔥 AUTO REFRESH */
setInterval(load, 3000);

</script>

</body>
</html>
